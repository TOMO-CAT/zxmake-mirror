name: Toolchains

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "Toolchains"
          fi

  arm-gnu:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "13.3.rel1"
            target: "arm-none-linux-gnueabihf"
            sha256: "560267bdecf966b7a48467d0af6c81a85b906ef7b0a9b9dd91f506184b940281"
          - version: "13.3.rel1"
            target: "aarch64-none-linux-gnu"
            sha256: "322f0b4482fc0d9fa0bb468134841f08d8c554c54ff5aa29a13a7a24bf7e1eb5"
    steps:
      - name: Download and Verify
        run: |
          filename="arm-gnu-toolchain-${{ matrix.version }}-x86_64-${{ matrix.target }}.tar.xz"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${{ matrix.version }}/binrel/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "arm-gnu-toolchain-${{ matrix.version }}-x86_64-${{ matrix.target }}.tar.xz" \
            --repo "${{ github.repository }}" --clobber

  android-ndk:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "r22"
            sha256: "d37fc69cd81e5660234a686e20adef39bc0244086e4d66525a40af771c020718"
    steps:
      - name: Download and Verify
        run: |
          filename="android-ndk-${{ matrix.version }}-linux-x86_64.zip"
          wget -q "https://dl.google.com/android/repository/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "android-ndk-${{ matrix.version }}-linux-x86_64.zip" \
            --repo "${{ github.repository }}" --clobber

  zig:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "0.13.0"
            sha256: "d45312e61ebcc48032b77bc4cf7fd6915c11fa16e4aad116b66c9468211230ea"
    steps:
      - name: Download and Verify
        run: |
          filename="zig-linux-x86_64-${{ matrix.version }}.tar.xz"
          curl -LO "https://ziglang.org/download/${{ matrix.version }}/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "zig-linux-x86_64-${{ matrix.version }}.tar.xz" \
            --repo "${{ github.repository }}" --clobber
