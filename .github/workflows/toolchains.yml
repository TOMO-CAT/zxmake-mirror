name: Toolchains

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --notes "Toolchains"
          fi

  arm-gnu:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "13.3.rel1"
            target: "arm-none-linux-gnueabihf"
            sha256: "68e67c165ffd25e09e4bcea0e51f0d1e137427e41e03be1e2a0f20ed37ae85ae"
          - version: "13.3.rel1"
            target: "aarch64-none-linux-gnu"
            sha256: "2bfa60044a2c3d6be6e904f4e3e53ebe634b4608a0521381e922dfc30c955b54"
    steps:
      - name: Download and Verify
        run: |
          filename="arm-gnu-toolchain-${{ matrix.version }}-x86_64-${{ matrix.target }}.tar.xz"
          wget -q "https://developer.arm.com/-/media/Files/downloads/gnu/${{ matrix.version }}/binrel/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "arm-gnu-toolchain-${{ matrix.version }}-x86_64-${{ matrix.target }}.tar.xz" \
            --repo "${{ github.repository }}" --clobber

  android-ndk:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "r22"
            sha256: "d37fc69cd81e5660234a686e20adef39bc0244086e4d66525a40af771c020718"
    steps:
      - name: Download and Verify
        run: |
          filename="android-ndk-${{ matrix.version }}-linux-x86_64.zip"
          wget -q "https://dl.google.com/android/repository/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "android-ndk-${{ matrix.version }}-linux-x86_64.zip" \
            --repo "${{ github.repository }}" --clobber

  zig:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "0.13.0"
            sha256: "d45f92f0ab3f28be48db2e34b6e03649a9a2de1b0dc8c48b85e20a4a3394d22a"
    steps:
      - name: Download and Verify
        run: |
          filename="zig-linux-x86_64-${{ matrix.version }}.tar.xz"
          curl -LO "https://ziglang.org/download/${{ matrix.version }}/${filename}"
          echo "${{ matrix.sha256 }}  ${filename}" | sha256sum -c -

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "zig-linux-x86_64-${{ matrix.version }}.tar.xz" \
            --repo "${{ github.repository }}" --clobber
