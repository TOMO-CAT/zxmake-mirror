name: Zig

on:
  push:
    tags:
      - '*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Toolchains" || true

  upload:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - version: "0.13.0"
    steps:
      - name: Download Zig
        run: |
          curl -LO "https://ziglang.org/download/${{ matrix.version }}/zig-linux-x86_64-${{ matrix.version }}.tar.xz"

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "zig-linux-x86_64-${{ matrix.version }}.tar.xz" \
            --repo "${{ github.repository }}"
